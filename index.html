<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel Frota</title>

<style>

:root{
  --bg:#071029;
  --card:#0b1a3a;
  --table:#0e224d;
  --table-alt:#0c1d40;
  --header:#2c4078;
  --border:#1e2f5c;
  --text:#ffffff;
  --muted:#9fb3ff;
  --green:#00ff9c;
  --yellow:#ffcc00;
  --red:#ff4d4d;
  --lime:#7CFC00;
  --blue:#6284fc;
  --row-height:44px; /* altura reduzida por linha nas tabelas */
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Arial,sans-serif;
  height:100vh;
  overflow:hidden;
}

header{
  display:grid;
  grid-template-columns: 180px 1fr 1fr;
  gap:16px;
  justify-content:space-between;
  padding:10px 20px;
  background:#020617;
  align-items:center;
  border-bottom: 1px solid rgba(255,255,255,.1);
}

h1{margin:0;}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}
  

main{
  display:grid;
  grid-template-rows:auto 1fr 1fr 1fr;
  gap:6px;
  padding:6px;
  height:calc(100vh - 95px);
}

table{
  width:100%;
  table-layout:auto;
  border-collapse:separate;
  border-spacing:0;
}

th,
td{
  padding:8px;
  text-align:left;
  overflow:hidden;
  text-overflow:ellipsis;
  word-wrap:break-word;
  color:#fff;
}

tbody td{
  padding:10px;
  border: 1px solid var(--border);
  background:var(--table);
  text-align:left;
  font-size:16px;
}

tbody tr:nth-child(odd) td{
  background:#0f2147;
}

tbody tr:nth-child(even) td{
  background:#152a57;
}

thead th{
  background:#198754;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:0.5px;
  font-size:0.9rem;
  font-weight:700;
  text-align:left;
  vertical-align:middle;
  position:sticky;
  top:0;
  padding:10px;
  border: 1px solid var(--border);
}

.header-left{
  justify-self:start;
  display:flex;
  align-items:center;
  gap:15px;
}

.header-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.header-right{
  justify-self:end;
  display:flex;
  align-items:center;
  gap:10px;
}

#clock{
  margin-right:8px;
  color:#ffffff;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
}

.logo{
  height:60px;
  width:auto;
}

#toggle-audio.off{
  background:#dc2626;
  color:white;
}

.resumo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  overflow: visible;
}

.resumo-card{
  background:#0b1a3a;
  border-radius:10px;
  padding:10px;
}

.resumo-card h2,
.card h2,
.card-resumo h2{
  margin: -10px -10px 12px -10px;
  padding: 12px;
  text-align: center;
  background:#2c4078;
  color: #fff;
  font-size: 1.1rem;
  font-weight: bold;
  border-radius: 10px 10px 0 0;
  letter-spacing: 1px;
  margin:0;
}

.card{
  background:var(--card);
  border-radius:10px;
  padding:10px;
  overflow:auto;
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
}

.card h2{
  text-align:left;
  margin:0;
  padding:4px 10px;
  font-size:20px;
}

.dual-cards{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  grid-template-columns:1fr 1fr;
  max-height:260px;
  overflow-y:auto;
}

.card-resumo{flex:1;}


.tabela-agenda{
    width:100%;
    table-layout:fixed;
}

.tabela-agenda th:nth-child(1),
.tabela-agenda td:nth-child(1){
    width:7%;
}

.tabela-agenda th:nth-child(2),
.tabela-agenda td:nth-child(2){
    width:7%;
}

.tabela-agenda th:nth-child(3),
.tabela-agenda td:nth-child(3){
    width:20%;
}

.tabela-agenda th:nth-child(4),
.tabela-agenda td:nth-child(4){
    width:1%;
}

.tabela-agenda th:nth-child(5),
.tabela-agenda td:nth-child(5){
    width:26%;
}

.tabela-agenda th:nth-child(6),
.tabela-agenda td:nth-child(6){
    width:20%;
}

.tabela-agenda th:nth-child(7),
.tabela-agenda td:nth-child(7){

/* ================= STATUS ================= */

.status-livre {
    color: var(--green);
    font-weight: 700;
}

.ocupado {
    color: var(--red);

}

.viagem {

}

.actions{

.status-icon{

}

  color:#ffffff;

}

.painel .status-andamento td,
.agenda .status-andamento td,

.agenda .status-cancelado td,

.painel .status-concluido td,

.painel .status-atendido td,

.painel .status-manutencao td,
.agenda .status-manutencao td,

.painel .status-viagem td,

.resumo-grid .card{

.resumo-grid .card tbody tr{

<!-- ================= MAIN ================= -->

<main id="app"></main>

<script>

/* ================= CONFIG ================= */

const SHEET_ID =
  "14T7zF0likp8YGeycOYBcOs9INY9gvMzpt7SMfghE8P4";

const TABS = [

    {
        id: "veiculos",
        title: "VEÍCULOS",
        sheet: "VEÍCULOS",
        class: "tabela-veiculo",
        headers: [
            "TRAIL TXN1I89",
            "CRETA TXJ6F18",
            "CRETA TXJ6F19",
            "CRETA TXJ6F20"
        ]
    },

    {
        id: "motoristas",
        title: "MOTORISTAS",
        sheet: "MOTORISTAS",
        class: "tabela-motoristas",
        headers: [
            "CACIO / 5000366",
            "CELSO DALDEGAN / 5000205",
            "NEIDIVAL / 5000199"
        ]
    },

    {
        id: "painel",
        title: "PAINEL",
        sheet: "LANÇAMENTOS",
        class: "tabela-painel",
        headers: [
            "Data",
            "Hora",
            "Empregado",
            "Veículo",
            "Passageiro/ Setor/ Motivo",
            "Itinerário",
            "Status"
        ]
    },

    {
        id: "agenda",
        title: "AGENDA DO DIA",
        sheet: "AGENDA DO DIA",
        class: "tabela-agenda",
        headers: [
            "Data",
            "Hora",
            "Passageiro",
            "Setor",
            "Motivo",
            "Itinerário",
            "Status"
        ]
    },

    {
        id: "social",
        title: "AGENDA SERVIÇO SOCIAL",
        sheet: "AGENDA SERVIÇO SOCIAL",
        class: "tabela-social",
        headers: [
            "Data",
            "Período",
            "Passageiro",
            "Motivo",
            "Itinerário",
            "Status"
        ]
    }

];

/* ================= STATUS CONFIG ================= */
const STATUS = {

  livre: {
    icon: "🟢",
    label: "LIVRE",
    class: "status-livre"
  },

  ocupado: {
    icon: "🔴",
    label: "OCUPADO",
    class: "status-ocupado"
  },

  viagem: {
    icon: "✈️",
    label: "VIAGEM",
    class: "status-viagem"
  },

  manutencao: {
    icon: "🔧",
    label: "MANUTENÇÃO",
    class: "status-manutencao"
  },

  andamento: {
    icon: "⏳",
    label: "EM ANDAMENTO",
    class: "status-andamento"
  },

  atendido: {
    icon: "✔",
    label: "ATENDIDO",
    class: "status-atendido"
  },

  concluido: {
    icon: "✔",
    label: "CONCLUÍDO",
    class: "status-concluido"
  },

  cancelado: {
    icon: "✖",
    label: "CANCELADO",
    class: "status-cancelado"
  }
};

function renderStatus(status){

    const key =
        getStatusKey(status);

    const cfg =
        STATUS[key];

    if(!cfg){
        return status || "";
    }

    return `
        <span class="${cfg.class}">
            ${cfg.icon} ${cfg.label}
        </span>
    `;
}


/* ================= HELPERS ================= */

const parseGviz = (txt) =>
    JSON.parse(
        txt.substring(
            txt.indexOf("{"),
            txt.lastIndexOf("}") + 1
        )
    );

const getCell = (c) =>
    c?.f ?? c?.v ?? "";

function parseDataHora(dataStr, horaStr) {

    if (!dataStr) {
        return new Date(0);
    }

    const d =
        dataStr.includes("/")
            ? dataStr.split("/")
            : new Date(dataStr);

    const dia =
        Array.isArray(d)
            ? d[0]
            : d.getDate();

    const mes =
        Array.isArray(d)
            ? d[1]
            : d.getMonth() + 1;

    const ano =
        Array.isArray(d)
            ? d[2]
            : d.getFullYear();

    const [hora, minuto] =
        (horaStr || "00:00").split(":");

    return new Date(
        Number(ano),
        Number(mes) - 1,
        Number(dia),
        Number(hora || 0),
        Number(minuto || 0)
    );
}

function getStatusKey(status = "") {

  status = String(status)
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  if (
    status.includes("manutencao") ||
    status.includes("manutenção")
  ) {
    return "manutencao";
  }

  if (status.includes("viagem")) {
    return "viagem";
  }

  if (
    status.includes("andamento") ||
    status.includes("em andamento")
  ) {
    return "andamento";
  }

  if (status.includes("cancel")) {
    return "cancelado";
  }

  if (status.includes("atendi")) {
    return "atendido";
  }

  if (status.includes("conclu")) {
    return "concluido";
  }

  if (status.includes("livre")) {
    return "livre";
  }

  if (status.includes("ocupado")) {
    return "ocupado";
  }

  return "";
}

function getStatusClass(status) {

  const key = getStatusKey(status);

  return STATUS[key]?.class || "";
}

function getStatusIcon(status) {

  const key = getStatusKey(status);

  return STATUS[key]?.icon || "";
}
/* ================= FETCH ================= */
async function fetchSheet(sheet) {

    try {

        const queries = {
            "LANÇAMENTOS": "select B,C,D,E,F,G,X",
            "AGENDA DO DIA": "select B,C,D,E,F,G,H",
            "AGENDA SERVIÇO SOCIAL": "select B,C,D,F,G,H",
            "VEÍCULOS": "select B,V,M,N",
            "MOTORISTAS": "select B,C,D"
        };

        const query = queries[sheet] || "";

        const url =
            `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
            `?sheet=${encodeURIComponent(sheet)}` +
            `&headers=1` +
            `&tq=${encodeURIComponent(query)}` +
            `&tqx=out:json`;

        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const text =
            await response.text();

        return parseGviz(text);

    } catch (error) {

        console.error(
            `Erro na aba ${sheet}:`,
            error
        );

        return {
            table: {
                rows: []
            }
        };
    }
}

/* ================= TABLE RENDERS ================= */
function renderTable(headers, rows) {

    return `
        <table>

            <thead>
                <tr>
                    ${headers.map(header =>
                        `<th>${header}</th>`
                    ).join("")}
                </tr>
            </thead>

            <tbody>

                ${rows.map(row => {

                    const values =
                        (row.c || []).map(getCell);

                    return `
                        <tr>

                            ${values.map((value,index)=>{

                                const isStatusColumn =
                                    index === values.length - 1;

                                return `
                                    <td>
                                        ${
                                            isStatusColumn
                                                ? renderStatus(value)
                                                : (value || "")
                                        }
                                    </td>
                                `;

                            }).join("")}

                        </tr>
                    `;

                }).join("")}

            </tbody>

        </table>
    `;
}

function getDisponibilidade(nome, painelRows, tipo) {

    const procurado = String(nome || "")
        .trim()
        .toUpperCase();

    for (const row of painelRows) {

        const valores = (row.c || []).map(getCell);

        const motorista = String(valores[2] || "")
            .trim()
            .toUpperCase();

        const veiculo = String(valores[3] || "")
            .trim()
            .toUpperCase();

        const status = String(valores[6] || "")
            .trim()
            .toUpperCase();

        const encontrado =
            tipo === "veiculo"
                ? veiculo === procurado
                : motorista === procurado;

        if (!encontrado) {
            continue;
        }

        // Veículo em manutenção
        if (
            status.includes("MANUTENÇÃO") ||
            status.includes("MANUTENCAO")
        ) {

            return tipo === "veiculo"
                ? renderStatus("manutencao")
                : renderStatus("livre");
        }

        // Em viagem
        if (status.includes("VIAGEM")) {
            return renderStatus("viagem");
        }

        // Encontrado e ocupado
        return renderStatus("ocupado");
    }

    // Não encontrado
    return renderStatus("livre");
}

function renderVeiculos(rows, painelRows){
  
  const displayRows = (rows || []).slice(0, 4); // mostra só as primeiras 4 linhas
  const ocultos = rows.length - displayRows.length;
   /*const more = (rows || []).length > 4 ? (rows.length - 4) : 0;*/

  return `
    <table>
      <thead>
        <tr>
          <th>Placa</th>
          <th>Status</th>
          <th>Odômetro</th>
          <th>Combustível</th>
        </tr>
      </thead>
      <tbody>
        ${displayRows.map(row => {
          const v = (row.c || []).map(getCell);
          return `
            <tr>
              <td><strong>${v[0] || ""}</strong></td>
              <td>${getDisponibilidade(v[0], painelRows, "veiculo")}</td>
              <td>${v[2] || ""} km</td>
              <td>⛽ ${v[3] || ""}</td>
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>

    ${ocultos>0
           ? `<div class="more-items">+${ocultos} veículo(s)</div>`
           : ""
        }
    `;
}

function renderMotoristas(rows, painelRows, linhaFlutuante) {
     
    const displayRows = rows.slice(0,4);
     const ocultos = rows.length-displayRows.length;

    return `
        <table>

            <thead>
                <tr>
                    <th>Motorista</th>
                    <th>Status</th>
                    <th>Condição</th>
                </tr>
            </thead>

            <tbody>

                ${displayRows.map(row => {

                    const values = (row.c || []).map(getCell);

                    return `
                        <tr>

                            <td>
                                <strong>${values[0] || ""}</strong>
                            </td>

                            <td>
                                ${getDisponibilidade(
                                    values[0],
                                    painelRows,
                                    "motorista"
                                )}
                            </td>

                            <td>
                                ${values[2] || ""}
                            </td>

                        </tr>
                    `;

                }).join("")}

                ${linhaFlutuante || ""}

            </tbody>

        </table>
        ${
            ocultos>0
                ? `<div class="more-items">+${ocultos} motorista(s)</div>`
                : ""
        }
    `;
}

/* ================= UI HELPERS ================= */
function playBeep(){
  const audio = document.getElementById('beep');
  const btn = document.getElementById('toggle-audio');
  if(!audio) return;
  if(btn && btn.classList.contains('off')) return; // muted
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

function updateClock() {
  const el = document.getElementById("clock");
  if (!el) return;

  const now = new Date();

  const data = now.toLocaleDateString("pt-BR");
  const hora = now.toLocaleTimeString("pt-BR", {
    hour: "2-digit",
    minute: "2-digit"
  });

  el.textContent = `${data} — ${hora}`;
}

function toggleFull(){
  const el = document.documentElement;
  if(!document.fullscreenElement){
    el.requestFullscreen?.();
  }else{
    document.exitFullscreen?.();
  }
}

/* Toggle audio button */
document.addEventListener('click', e=>{
  if(e.target && e.target.id === 'toggle-audio'){
    e.target.classList.toggle('off');
    e.target.textContent = e.target.classList.contains('off') ? '🔈 SOM OFF' : '🔊 SOM ON';
  }
});


/* ================= LOAD ================= */
let lastHash = "";
let firstLoad = true;

async function loadAll() {

    const app =
        document.getElementById("app");

    try {

        const results = await Promise.all(
            TABS.map(tab =>
                fetchSheet(tab.sheet)
            )
        );

        const hash =
            JSON.stringify(results);

        if (
            !firstLoad &&
            hash !== lastHash
        ) {
            playBeep();
        }

        firstLoad = false;
        lastHash = hash;

        app.innerHTML = "";

        const painelIndex =
            TABS.findIndex(
                tab => tab.id === "painel"
            );

        const agendaIndex =
            TABS.findIndex(
                tab => tab.id === "agenda"
            );

        const socialIndex =
            TABS.findIndex(
                tab => tab.id === "social"
            );

        const veiculosIndex =
            TABS.findIndex(
                tab => tab.id === "veiculos"
            );

        const motoristasIndex =
            TABS.findIndex(
                tab => tab.id === "motoristas"
            );

        const hoje =
            new Date()
                .toLocaleDateString("pt-BR");

        // Painel
        const painelRows =
            (results[painelIndex].table.rows || [])
                .filter(row => {

                    const v =
                        (row.c || [])
                            .map(getCell);

                    const status =
                        String(v[6] || "")
                            .toUpperCase()
                            .trim();

                    return (
                        status.includes("AGENDADO") ||
                        status.includes("EM ANDAMENTO") ||
                        status.includes("VIAGEM") ||
                        status.includes("MANUTENÇÃO") ||
                        status.includes("MANUTENCAO")
                    );

                });

        

painelRows.sort((a, b) => {

    const va = (a.c || []).map(getCell);
    const vb = (b.c || []).map(getCell);

    return (
        parseDataHora(va[0], va[1]) -
        parseDataHora(vb[0], vb[1])
    );

});

// Agenda do Dia
const agendaRows =
    (results[agendaIndex].table.rows || [])
        .filter(row => {

            const v =
                (row.c || []).map(getCell);

            return (
                String(v[0] || "").trim() === hoje
            );

        });

agendaRows.sort((a, b) => {

    const va =
        (a.c || []).map(getCell);

    const vb =
        (b.c || []).map(getCell);

    return (
        parseDataHora(va[0], va[1]) -
        parseDataHora(vb[0], vb[1])
    );

});


// Agenda Serviço Social
const socialRows =
    (results[socialIndex].table.rows || [])
        .filter(row => {

            const v =
                (row.c || []).map(getCell);

            return (
                String(v[0] || "").trim() === hoje
            );

        });

 
const veiculosRows =
    results[veiculosIndex].table.rows || [];

const motoristasRows =
    results[motoristasIndex].table.rows || [];


// Localiza motorista não cadastrado
const motoristaFlutuante =
    painelRows.find(row => {

        const v =
            (row.c || []).map(getCell);

        const nome =
            String(v[2] || "").trim();

        return !motoristasRows.some(r => {

            const motoristaCadastro =
                String(
                    ((r.c || [])[0]?.f ??
                    (r.c || [])[0]?.v) || ""
                ).trim();

            return (
                motoristaCadastro === nome
            );

        });

    });


let linhaFlutuante = "";

if (motoristaFlutuante) {

    const v =
        (motoristaFlutuante.c || [])
            .map(getCell);

    const nome =
        String(v[2] || "").trim();

    const status =
        String(v[6] || "");

    let textoStatus =
        renderStatus("ocupado");


    if (
        status
            .toUpperCase()
            .includes("VIAGEM")
    ) {
        textoStatus =
            renderStatus("viagem");
    }

    if (
        status
            .toUpperCase()
            .includes("MANUTENÇÃO") ||

        status
            .toUpperCase()
            .includes("MANUTENCAO")
    ) {
        textoStatus =
            renderStatus("manutencao");
    }

    linhaFlutuante =
        criarLinhaFlutuante(
            nome,
            textoStatus
        );
}

      function criarLinhaFlutuante(nome, textoStatus) {
    return `
        <tr class="linha-flutuante">

            <td>
                <strong>${nome}</strong>
            </td>

            <td>
                ${textoStatus}
            </td>

            <td class="usuario-nao-cadastrado">
                ⚠️ USUÁRIO NÃO CADASTRADO
            </td>

        </tr>
    `;
}


       function criarCardTabela(tab, rows) {

    return criarCard(
        tab.title,
        renderTable(
            tab.headers,
            rows,
            tab.class
        )
    );

}



    // build DOM
    function criarCard(titulo, conteudo) {

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
        <h2>${titulo}</h2>
        ${conteudo}
    `;

    return card;
}
const veiculosCard = criarCard(
    TABS[veiculosIndex].title,
    renderVeiculos(
        veiculosRows,
        painelRows
    )
);

const motoristasCard = criarCard(
    TABS[motoristasIndex].title,
    renderMotoristas(
        motoristasRows,
        painelRows,
        linhaFlutuante
    )
);

const painelCard = criarCardTabela(TABS[painelIndex], painelRows);

const agendaCard = criarCardTabela(TABS[agendaIndex], agendaRows);

const socialCard = criarCardTabela(TABS[socialIndex], socialRows);

/*
const painelCard = criarCard(
    TABS[painelIndex].title,
    renderTable(
        TABS[painelIndex].headers,

    )
);

const agendaCard = criarCard(

    )
);

const socialCard = criarCard(
    TABS[socialIndex].title,
    renderTable(
        TABS[socialIndex].headers,
        socialRows
    )
);
*/

    // Top: Veículos + Motoristas (lado a lado)
    const resumo = document.createElement('div');
    resumo.className = 'resumo-grid';
    resumo.appendChild(veiculosCard);
    resumo.appendChild(motoristasCard);

    const mainContainer = document.getElementById('app');
    mainContainer.appendChild(resumo);

    // Then Painel (full width)
    mainContainer.appendChild(painelCard);

    // Agenda do dia (own line)
    mainContainer.appendChild(agendaCard);

    // Agenda Serviço Social (own line)
    mainContainer.appendChild(socialCard);

  }catch(err){ console.error(
                   'Erro ao carregar dados:',
                    err); }
}

// initial actions
updateClock(); setInterval(updateClock, 1000);
loadAll(); setInterval(loadAll, 15000);
